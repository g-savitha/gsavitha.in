name: Deploy Astro site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "." # By default, the build happens in the root
  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ vars.R2_BUCKET }}
  AUDIO_PUBLIC_BASE_URL: ${{ vars.AUDIO_PUBLIC_BASE_URL }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
      - name: Install dependencies
        run: bun install
        working-directory: ${{ env.BUILD_PATH }}
      - name: Remove stale audio metadata
        run: bun run audio:check --prune-stale
        working-directory: ${{ env.BUILD_PATH }}
      - name: Cache Kokoro model
        if: env.R2_ACCOUNT_ID != '' && env.R2_BUCKET != '' && env.AUDIO_PUBLIC_BASE_URL != ''
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            node_modules/@huggingface/transformers/.cache
          key: kokoro-q8-v1-${{ runner.os }}
      - name: Generate missing English audio
        if: env.R2_ACCOUNT_ID != '' && env.R2_BUCKET != '' && env.AUDIO_PUBLIC_BASE_URL != ''
        continue-on-error: true
        run: bun run audio:generate
        working-directory: ${{ env.BUILD_PATH }}
      - name: Upload generated audio to R2
        if: always() && env.R2_ACCOUNT_ID != '' && env.R2_BUCKET != '' && env.AUDIO_PUBLIC_BASE_URL != ''
        continue-on-error: true
        run: bun run audio:upload
        working-directory: ${{ env.BUILD_PATH }}
      - name: Save published audio metadata
        if: always()
        continue-on-error: true
        run: |
          if git diff --quiet -- src/data/audioManifest.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/audioManifest.json
          git commit -m "chore: update generated blog audio metadata"
          git push
      - name: Build with Astro
        run: bun run build
        working-directory: ${{ env.BUILD_PATH }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
